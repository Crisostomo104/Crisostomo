<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - John Lodie Crisostomo</title>
    
    <!-- Dynamic SVG Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22grad%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%220%25%22><stop offset=%220%25%22 stop-color=%22%236366f1%22/><stop offset=%22100%25%22 stop-color=%22%238b5cf6%22/></linearGradient></defs><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22url(%23grad)%22/><text x=%2250%22 y=%2265%22 font-family=%22Arial, sans-serif%22 font-size=%2238%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>JLC</text></svg>">
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: var(--font-body);
        }
        
        .resume-header {
            padding: 1rem 5%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .resume-header h2 {
            color: var(--text-main);
            font-size: 1.2rem;
            margin: 0;
            font-family: var(--font-heading);
            display: none;
        }

        @media (min-width: 768px) {
            .resume-header h2 {
                display: block;
            }
        }

        .resume-content {
            flex: 1;
            width: 100%;
            border: none;
            background: #ffffff; /* PDFs usually have white backgrounds */
        }
    </style>
</head>
<body>
    
    <div class="resume-header">
        <a href="index.html" class="btn btn-secondary">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back to Portfolio
        </a>
        
        <h2>Curriculum Vitae</h2>
        
        <a href="RESUME.pdf" download class="btn btn-primary">
            <i class="fas fa-download" style="margin-right: 8px;"></i> Download PDF
        </a>
    </div>

    <!-- Embed the PDF full screen with toolbar disabled to prevent casual downloading/printing -->
    <iframe src="RESUME.pdf#toolbar=0&navpanes=0" class="resume-content" title="Resume PDF"></iframe>

    <script>
        // Disable Right-Click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable Keyboard Shortcuts (Ctrl+S, Ctrl+P, Ctrl+U)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's' || e.key === 'p' || e.key === 'u' || e.key === 'c') {
                    e.preventDefault();
                    console.log("Shortcut disabled for security.");
                }
            }
        });
    </script>
</body>
</html>
